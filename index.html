<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE320 - Software Engineering Notes</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/content.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/vs2015.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>
<body>
    <!-- Top Progress Bar -->
    <div id="progress-bar">
        <div id="progress-fill"></div>
        <span id="progress-text">0% Complete</span>
    </div>

    <div id="app-container">
        <!-- Left Sidebar Navigation -->
        <nav id="sidebar">
            <div id="sidebar-header">
                <div id="logo">
                    <span class="logo-icon">&lt;/&gt;</span>
                    <h1>CSE320 Notes</h1>
                </div>
                <input type="search" id="search-box" placeholder="Search topics...">
            </div>
            <div id="sidebar-content">
                <!-- Generated by JavaScript -->
            </div>
            <div id="sidebar-footer">
                <a href="https://github.com/Raviranjan010/Software_Engineering_cse320" target="_blank" class="github-link">
                    View on GitHub
                </a>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main id="main-content">
            <div id="content-header">
                <button id="menu-toggle" class="mobile-only">☰</button>
                <nav id="breadcrumbs"></nav>
                <div id="content-actions">
                    <span id="reading-time"></span>
                    <button id="mark-complete" class="btn-secondary">Mark Complete</button>
                </div>
            </div>
            
            <article id="article-content">
                <div id="welcome-screen">
                    <h1>Welcome to CSE320</h1>
                    <p>Software Engineering - Complete Study Notes</p>
                    <div id="continue-reading" class="hidden">
                        <h3>Continue where you left off:</h3>
                        <a id="continue-link" href="#" class="btn-primary">Resume Learning</a>
                    </div>
                    <div id="quick-stats">
                        <div class="stat-card">
                            <div class="stat-number" id="stat-topics">0</div>
                            <div class="stat-label">Total Topics</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="stat-completed">0</div>
                            <div class="stat-label">Completed</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="stat-progress">0%</div>
                            <div class="stat-label">Progress</div>
                        </div>
                    </div>
                </div>
            </article>

            <div id="content-footer">
                <button id="prev-topic" class="btn-nav" disabled>← Previous</button>
                <button id="next-topic" class="btn-nav" disabled>Next →</button>
            </div>
        </main>

        <!-- Right Sidebar - Table of Contents -->
        <aside id="toc-sidebar">
            <h3>On This Page</h3>
            <div id="toc-content"></div>
        </aside>
    </div>

    <!-- Back to Top Button -->
    <button id="back-to-top" class="hidden">↑</button>

    <!-- JavaScript Files -->
    <script src="js/navigation.js"></script>
    <script src="js/markdown-parser.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
